<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mine Swine | RED vs BLU | Release 2.4</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Impact', 'Arial Black', sans-serif;
            padding: 20px;
        }

        .cloud {
            position: fixed;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 1000px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            z-index: 0;
            pointer-events: none;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
        }
        .cloud::before { width: 50%; height: 80%; top: -40%; left: 10%; }
        .cloud::after { width: 70%; height: 70%; top: -30%; right: 10%; }
        .cloud1 { width: 120px; height: 70px; top: 10%; left: 5%; }
        .cloud2 { width: 180px; height: 100px; top: 20%; right: 10%; }
        .cloud3 { width: 150px; height: 85px; bottom: 15%; left: 15%; }
        .cloud4 { width: 100px; height: 60px; bottom: 25%; right: 20%; }

        .game-container {
            position: relative;
            z-index: 1;
            background: rgba(60, 44, 31, 0.85);
            backdrop-filter: blur(3px);
            border-radius: 60px;
            padding: 20px;
            max-width: 1200px;
            width: 100%;
            box-shadow: 0 20px 0 #2d241b, 0 30px 30px rgba(0,0,0,0.5);
        }

        .tf2-panel {
            background: #3c2c1f;
            border-radius: 40px;
            padding: 20px;
            box-shadow: inset 0 0 0 3px #846b4a, inset 0 0 0 8px #5e422c, 0 10px 15px black;
        }

        h1 {
            text-align: center;
            margin: 0 0 5px;
            font-size: 1.8rem;
            color: #f7e05e;
            text-shadow: 4px 4px 0 #7a2e19;
        }

        .sub {
            text-align: center;
            color: #e6b86e;
            margin-bottom: 15px;
            font-size: 0.8rem;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .mode-btn {
            background: #2d241c;
            border: 2px solid #e6b86e;
            color: #f3d382;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 40px;
            cursor: pointer;
        }
        .mode-btn.active { background: #c97e3a; color: #fff3bf; }

        .game-layout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .troop {
            flex: 1;
            min-width: 150px;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            padding: 15px;
            text-align: center;
        }

        .troop-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .pigs-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            justify-items: center;
            align-items: center;
        }

        .pig-card {
            font-size: 2.5rem;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 10px;
            width: 70px;
            text-align: center;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .pig-card.red { background: #ff6b4a; border: 2px solid #ffcc66; }
        .pig-card.blue { background: #6bb5ff; border: 2px solid #ffcc66; }

        .board-container {
            flex: 2;
            min-width: 280px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: #825e38;
            padding: 15px;
            border-radius: 30px;
            box-shadow: inset 0 0 0 3px #ebc28e, 0 8px 15px black;
        }

        .cell {
            aspect-ratio: 1 / 1;
            background: #ecd5a5;
            background-image: radial-gradient(circle at 25% 30%, #ffefcf, #cfb17a);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: inset 0 -3px 0 #926d42, 0 4px 8px rgba(0,0,0,0.3);
            transition: 0.05s linear;
            flex-direction: column;
        }
        .cell:active { transform: scale(0.96); }
        .cell.wire {
            background: repeating-linear-gradient(45deg, #888, #888 8px, #555 8px, #555 16px);
            cursor: not-allowed;
        }
        .cell.selected-red { background: #ff6b4a; box-shadow: 0 0 0 3px #ffcc66; }
        .cell.selected-blue { background: #6bb5ff; box-shadow: 0 0 0 3px #ffcc66; }
        .cell.temp-mine-red { background: #ff6b4a; animation: blink-red 0.3s ease-in-out 2; }
        .cell.temp-mine-blue { background: #6bb5ff; animation: blink-blue 0.3s ease-in-out 2; }
        .cell.explosion { background: #ff5e3a; animation: shake 0.2s ease-in-out 0s 2; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        @keyframes blink-red {
            0% { background-color: #ff6b4a; }
            50% { background-color: #ff0000; box-shadow: 0 0 20px 10px rgba(255,0,0,0.9); }
            100% { background-color: #ff6b4a; }
        }
        @keyframes blink-blue {
            0% { background-color: #6bb5ff; }
            50% { background-color: #0033cc; box-shadow: 0 0 20px 10px rgba(0,51,204,0.9); }
            100% { background-color: #6bb5ff; }
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            flex-wrap: wrap;
            gap: 8px;
        }

        .turn-indicator {
            background: #1e1b16;
            padding: 8px 20px;
            border-radius: 40px;
            color: #f3d382;
            font-size: 1rem;
        }

        button {
            background: #c97e3a;
            border: none;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: bold;
            color: #f7e6b0;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 0 #6a3c1a;
            margin-top: 8px;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #6a3c1a; }

        .message {
            background: #1a1510;
            padding: 8px 15px;
            border-radius: 30px;
            color: #ffd78c;
            text-align: center;
            font-size: 0.85rem;
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            margin-top: 20px;
            color: #aa8b60;
        }

        .result-box {
            background: #1e1b16;
            border-radius: 20px;
            padding: 12px;
            margin-top: 12px;
            text-align: center;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="tf2-panel">
        <h1>🐷 RED vs BLU: СВИНЬИ-САПЁРЫ 💣</h1>
        <div class="sub">Release 2.4 — Бомбы видны лишь мгновение</div>

        <div class="mode-selector">
            <div class="mode-btn active" data-mode="2p">👥 2 ИГРОКА</div>
            <div class="mode-btn" data-mode="ai">🤖 ПРОТИВ AI</div>
        </div>

        <div class="game-layout">
            <div class="troop">
                <div class="troop-title">🔴 RED</div>
                <div class="pigs-container" id="redTroop"></div>
            </div>
            <div class="board-container">
                <div class="board" id="board"></div>
            </div>
            <div class="troop">
                <div class="troop-title">🔵 BLU</div>
                <div class="pigs-container" id="blueTroop"></div>
            </div>
        </div>

        <div class="game-info">
            <div class="turn-indicator" id="turnText">🔴 ВЫБОР RED</div>
            <button id="resetBtn">🔄 НОВАЯ ИГРА</button>
        </div>

        <div class="message" id="message">🎯 RED выбирает 6 позиций (противник не видит)</div>
        <button id="readyBtn" class="ready-btn hidden" style="background:#4caf50; display:none;">✅ ЗАКОНЧИЛ ВЫБОР</button>
        <div id="resultBox" class="result-box hidden"></div>
        <footer>💣 Бомбы показываются на 1 секунду, потом исчезают! Конфликт — по номерам.</footer>
    </div>
</div>

<script>
    // ========== RELEASE 2.4 — БОМБЫ ВИДНЫ ЛИШЬ МГНОВЕНИЕ ==========
    
    const TOTAL_CELLS = 25;
    const START_PIGS = 6;
    
    let wireCells = [];
    let round = 1;
    let gameActive = true;
    let gameMode = '2p';
    let phase = 'selection';
    let currentSelector = 'red';
    
    let redPositions = [];
    let bluePositions = [];
    
    let redPigs = START_PIGS;
    let bluePigs = START_PIGS;
    
    // Для битвы
    let mines = new Map();  // постоянные бомбы (после конфликтов)
    let battleQueue = [];
    let battleIndex = 0;
    let battleActive = false;
    
    // DOM
    const boardEl = document.getElementById('board');
    const redTroopEl = document.getElementById('redTroop');
    const blueTroopEl = document.getElementById('blueTroop');
    const turnText = document.getElementById('turnText');
    const messageDiv = document.getElementById('message');
    const readyBtn = document.getElementById('readyBtn');
    const resultBox = document.getElementById('resultBox');
    const resetBtn = document.getElementById('resetBtn');
    
    function generateWire() {
        wireCells = [];
        const wireCount = Math.floor(Math.random() * 3) + 1;
        const all = Array.from({length: TOTAL_CELLS}, (_, i) => i);
        for (let i = all.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [all[i], all[j]] = [all[j], all[i]];
        }
        for (let i = 0; i < wireCount; i++) wireCells.push(all[i]);
    }
    
    function renderTroops() {
        redTroopEl.innerHTML = '';
        for (let i = 0; i < redPigs; i++) {
            const pig = document.createElement('div');
            pig.className = 'pig-card red';
            pig.textContent = '🐷';
            redTroopEl.appendChild(pig);
        }
        blueTroopEl.innerHTML = '';
        for (let i = 0; i < bluePigs; i++) {
            const pig = document.createElement('div');
            pig.className = 'pig-card blue';
            pig.textContent = '🐗';
            blueTroopEl.appendChild(pig);
        }
    }
    
    function renderBoard() {
        boardEl.innerHTML = '';
        for (let i = 0; i < TOTAL_CELLS; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            
            if (wireCells.includes(i)) {
                cell.classList.add('wire');
                cell.textContent = '⚡';
            } 
            else if (phase === 'selection') {
                if (currentSelector === 'red' && redPositions.includes(i)) {
                    cell.classList.add('selected-red');
                    cell.textContent = '🐷';
                } else if (currentSelector === 'blue' && bluePositions.includes(i)) {
                    cell.classList.add('selected-blue');
                    cell.textContent = '🐗';
                } else {
                    cell.textContent = '';
                }
            }
            else if (phase === 'battle') {
                const mine = mines.get(i);
                if (mine) {
                    cell.classList.add(mine.owner === 'red' ? 'has-red-mine' : 'has-blue-mine');
                    cell.innerHTML = `${mine.owner === 'red' ? '🐷' : '🐗'}<div style="font-size:0.7rem;">${mine.number}</div>`;
                } else {
                    cell.textContent = '';
                }
            }
            
            let canClick = false;
            if (phase === 'selection' && gameActive && !wireCells.includes(i)) {
                canClick = true;
            }
            
            if (canClick) {
                cell.addEventListener('click', (function(idx) { return () => onCellClick(idx); })(i));
            } else {
                cell.style.cursor = 'not-allowed';
            }
            
            boardEl.appendChild(cell);
        }
    }
    
    function onCellClick(idx) {
        if (!gameActive || phase !== 'selection') return;
        if (wireCells.includes(idx)) return;
        
        const positions = currentSelector === 'red' ? redPositions : bluePositions;
        const maxPigs = currentSelector === 'red' ? redPigs : bluePigs;
        
        if (positions.includes(idx)) {
            const pos = positions.indexOf(idx);
            positions.splice(pos, 1);
            messageDiv.textContent = `${currentSelector === 'red' ? '🔴 RED' : '🔵 BLU'} убрал позицию (${positions.length}/${maxPigs})`;
        } else {
            if (positions.length < maxPigs) {
                positions.push(idx);
                messageDiv.textContent = `${currentSelector === 'red' ? '🔴 RED' : '🔵 BLU'} выбрал позицию (${positions.length}/${maxPigs})`;
            } else {
                messageDiv.textContent = `❌ Нельзя выбрать больше ${maxPigs} позиций!`;
                return;
            }
        }
        
        renderBoard();
        
        if (positions.length === maxPigs) {
            readyBtn.style.display = 'block';
            messageDiv.textContent = `✅ Выбрано ${maxPigs} позиций! Нажми "ЗАКОНЧИЛ ВЫБОР"`;
        } else {
            readyBtn.style.display = 'none';
        }
    }
    
    function finishSelection() {
        if (phase !== 'selection') return;
        
        const positions = currentSelector === 'red' ? redPositions : bluePositions;
        const maxPigs = currentSelector === 'red' ? redPigs : bluePigs;
        
        if (positions.length !== maxPigs) {
            messageDiv.textContent = `❌ Нужно выбрать ровно ${maxPigs} позиций! (выбрано ${positions.length})`;
            return;
        }
        
        if (currentSelector === 'red') {
            currentSelector = 'blue';
            readyBtn.style.display = 'none';
            messageDiv.textContent = `🔵 BLU выбирает ${bluePigs} позиций (противник не видит)`;
            turnText.innerHTML = '🔵 ВЫБОР BLU';
            renderBoard();
            
            if (gameMode === 'ai') {
                setTimeout(() => aiSelectPositions(), 300);
            }
        } else {
            startBattle();
        }
    }
    
    function aiSelectPositions() {
        if (phase !== 'selection' || currentSelector !== 'blue') return;
        
        bluePositions = [];
        let available = [];
        for (let i = 0; i < TOTAL_CELLS; i++) {
            if (!wireCells.includes(i)) {
                available.push(i);
            }
        }
        for (let i = available.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [available[i], available[j]] = [available[j], available[i]];
        }
        for (let i = 0; i < bluePigs && i < available.length; i++) {
            bluePositions.push(available[i]);
        }
        messageDiv.textContent = `🤖 AI выбрал ${bluePositions.length} позиций`;
        renderBoard();
        finishSelection();
    }
    
    function startBattle() {
        phase = 'battle';
        readyBtn.style.display = 'none';
        messageDiv.textContent = `⚔️ РАУНД ${round}! Битва начинается...`;
        turnText.innerHTML = '⚔️ БИТВА';
        
        mines.clear();
        
        // Создаём очередь ходов
        battleQueue = [];
        for (let i = 1; i <= START_PIGS; i++) {
            if (i <= redPigs && i-1 < redPositions.length) {
                battleQueue.push({ owner: 'red', cell: redPositions[i-1], number: i });
            }
            if (i <= bluePigs && i-1 < bluePositions.length) {
                battleQueue.push({ owner: 'blue', cell: bluePositions[i-1], number: i });
            }
        }
        
        battleIndex = 0;
        processNextBattleMove();
    }
    
    function showTemporaryMine(cell, owner, number, onComplete) {
        // Показываем бомбу на 1 секунду
        const cellDiv = boardEl.children[cell];
        if (cellDiv) {
            cellDiv.classList.add(owner === 'red' ? 'temp-mine-red' : 'temp-mine-blue');
            cellDiv.innerHTML = `${owner === 'red' ? '🐷' : '🐗'}<div style="font-size:0.7rem;">${number}</div>`;
            
            setTimeout(() => {
                if (cellDiv) {
                    cellDiv.classList.remove(owner === 'red' ? 'temp-mine-red' : 'temp-mine-blue');
                    cellDiv.innerHTML = '';
                }
                if (onComplete) onComplete();
            }, 800);
        } else {
            if (onComplete) onComplete();
        }
    }
    
    function processNextBattleMove() {
        if (battleIndex >= battleQueue.length) {
            if (redPigs <= 0 || bluePigs <= 0) {
                endGame();
            } else {
                nextRound();
            }
            return;
        }
        
        const move = battleQueue[battleIndex];
        
        // Проверяем конфликт
        let conflict = null;
        for (let [cell, mine] of mines) {
            if (cell === move.cell) {
                conflict = mine;
                break;
            }
        }
        
        if (conflict) {
            // Конфликт! Сначала показываем бомбу, потом взрыв
            showTemporaryMine(move.cell, move.owner, move.number, () => {
                if (move.number > conflict.number) {
                    if (move.owner === 'red') {
                        redPigs--;
                        messageDiv.textContent = `💥 КОНФЛИКТ! 🐷 RED (№${move.number}) > 🐗 BLU (№${conflict.number}) → RED взорвался!`;
                    } else {
                        bluePigs--;
                        messageDiv.textContent = `💥 КОНФЛИКТ! 🐗 BLU (№${move.number}) > 🐷 RED (№${conflict.number}) → BLU взорвался!`;
                    }
                    renderTroops();
                } 
                else if (conflict.number > move.number) {
                    if (conflict.owner === 'red') {
                        redPigs--;
                        messageDiv.textContent = `💥 КОНФЛИКТ! 🐷 RED (№${conflict.number}) > 🐗 BLU (№${move.number}) → RED взорвался!`;
                    } else {
                        bluePigs--;
                        messageDiv.textContent = `💥 КОНФЛИКТ! 🐗 BLU (№${conflict.number}) > 🐷 RED (№${move.number}) → BLU взорвался!`;
                    }
                    mines.delete(move.cell);
                    renderTroops();
                }
                else {
                    if (move.owner === 'red') redPigs--;
                    else bluePigs--;
                    if (conflict.owner === 'red') redPigs--;
                    else bluePigs--;
                    messageDiv.textContent = `💥 КОНФЛИКТ! Обе бомбы №${move.number} взорвались!`;
                    mines.delete(move.cell);
                    renderTroops();
                }
                
                // Показываем взрыв
                const cellDiv = boardEl.children[move.cell];
                if (cellDiv) {
                    cellDiv.classList.add('explosion');
                    cellDiv.innerHTML = '💥';
                    setTimeout(() => {
                        if (cellDiv) cellDiv.classList.remove('explosion');
                        renderBoard();
                        battleIndex++;
                        processNextBattleMove();
                    }, 600);
                } else {
                    battleIndex++;
                    processNextBattleMove();
                }
            });
        } else {
            // Нет конфликта — показываем бомбу, потом ставим постоянную
            showTemporaryMine(move.cell, move.owner, move.number, () => {
                mines.set(move.cell, { owner: move.owner, number: move.number });
                renderBoard();
                battleIndex++;
                processNextBattleMove();
            });
        }
    }
    
    function nextRound() {
        round++;
        redPositions = [];
        bluePositions = [];
        currentSelector = 'red';
        phase = 'selection';
        
        turnText.innerHTML = '🔴 ВЫБОР RED';
        messageDiv.innerHTML = `🎯 РАУНД ${round}! RED выбирает ${redPigs} позиций (противник не видит)`;
        renderBoard();
        renderTroops();
    }
    
    function endGame() {
        gameActive = false;
        let winner = '';
        if (redPigs > 0 && bluePigs <= 0) winner = '🔴 RED ПОБЕДИЛ! 🐷';
        else if (bluePigs > 0 && redPigs <= 0) winner = '🔵 BLU ПОБЕДИЛ! 🐗';
        else winner = '⚡ НИЧЬЯ!';
        
        resultBox.classList.remove('hidden');
        resultBox.innerHTML = `
            <div style="font-size:1.2rem;">🏆 ${winner} 🏆</div>
            <div>🐷 RED: ${redPigs} | 🐗 BLU: ${bluePigs}</div>
            <div>Раундов сыграно: ${round}</div>
            <button id="playAgainBtn" style="margin-top:12px;">🎮 СЫГРАТЬ ЕЩЁ</button>
        `;
        turnText.innerHTML = winner;
        document.getElementById('playAgainBtn')?.addEventListener('click', () => resetGame());
    }
    
    function resetGame() {
        generateWire();
        redPositions = [];
        bluePositions = [];
        redPigs = START_PIGS;
        bluePigs = START_PIGS;
        round = 1;
        currentSelector = 'red';
        phase = 'selection';
        gameActive = true;
        mines.clear();
        resultBox.classList.add('hidden');
        readyBtn.style.display = 'none';
        
        turnText.innerHTML = '🔴 ВЫБОР RED';
        messageDiv.innerHTML = '🎯 RED выбирает 6 позиций (противник не видит)';
        renderBoard();
        renderTroops();
    }
    
    readyBtn.addEventListener('click', finishSelection);
    resetBtn.addEventListener('click', resetGame);
    
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            gameMode = btn.getAttribute('data-mode');
            resetGame();
        });
    });
    
    generateWire();
    renderBoard();
    renderTroops();
</script>
</body>
</html>
